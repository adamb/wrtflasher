- id: bedroom_ac_night
  alias: "Bedroom AC: Night schedule (73°F at 10pm)"
  description: "Set bedroom AC to 73°F at 10pm unless manually overridden or away"
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.bedroom_ac_manual_override
      state: "off"
    - condition: state
      entity_id: input_boolean.bedroom_ac_away
      state: "off"
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.master_ac
          state: "off"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.bedroom_ac_last_auto_temp
      data:
        value: 73
    - service: climate.set_temperature
      target:
        entity_id: climate.master_ac
      data:
        temperature: 73
    - service: notify.mobile_app_blue17
      data:
        message: "Bedroom AC set to 73°F (night schedule)"
