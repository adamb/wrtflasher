- id: grid_status_alert
  alias: Grid Status Alert
  description: Announce and notify when the grid goes offline or comes back online.
  mode: single
  triggers:
  - trigger: state
    entity_id: sensor.finca_del_mar_grid_status
    to: off_grid_unintentional
    id: grid_off
  - trigger: state
    entity_id: sensor.finca_del_mar_grid_status
    to: on_grid
    id: grid_on
  conditions: []
  actions:
  - variables:
      msg: >
        {% if trigger.id == 'grid_off' %}Grid is offline{% else %}Grid is back online{% endif %}
  - action: media_player.turn_on
    target:
      entity_id: media_player.garage_speaker
  - delay:
      seconds: 1
  - action: media_player.volume_set
    target:
      entity_id: media_player.garage_speaker
    data:
      volume_level: 0.3
  - action: tts.speak
    target:
      entity_id: tts.google_en_com
    data:
      media_player_entity_id: media_player.garage_speaker
      message: '{{ msg }}'
  - delay:
      seconds: 3
  - action: media_player.volume_set
    target:
      entity_id: media_player.garage_speaker
    data:
      volume_level: 0.2
  - action: notify.mobile_app_blue17
    data:
      title: '{% if trigger.id == "grid_off" %}Grid Offline{% else %}Grid Online{% endif %}'
      message: '{{ msg }}'
