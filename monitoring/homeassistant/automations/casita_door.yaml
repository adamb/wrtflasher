- id: '1769400000001'
  alias: Announce Casita Door
  description: >-
    Announce when the casita door opens, but throttle to once per 15 minutes.
    Uses mode: single with a 15-minute cooldown delay so repeated opens
    during guest house use don't spam announcements.
  triggers:
  - trigger: state
    entity_id: binary_sensor.casita_door
    to: 'on'
  actions:
  - action: media_player.turn_on
    target:
      entity_id: media_player.garage_speaker
  - delay:
      seconds: 1
  - variables:
      garage_volume: '{{ state_attr(''media_player.garage_speaker'', ''volume_level'') }}'
      living_volume: '{{ state_attr(''media_player.living_room'', ''volume_level'') }}'
  - action: media_player.volume_set
    target:
      entity_id:
      - media_player.garage_speaker
      - media_player.living_room
    data:
      volume_level: 0.3
  - action: tts.speak
    target:
      entity_id: tts.google_en_com
    data:
      media_player_entity_id:
      - media_player.garage_speaker
      - media_player.living_room
      message: '{{ trigger.to_state.attributes.friendly_name }} is open'
  - delay:
      seconds: 3
  - action: media_player.volume_set
    target:
      entity_id: media_player.garage_speaker
    data:
      volume_level: '{{ garage_volume }}'
  - action: media_player.volume_set
    target:
      entity_id: media_player.living_room
    data:
      volume_level: '{{ living_volume }}'
  - action: notify.mobile_app_blue17
    data:
      title: Door Open Alert
      message: '{{ trigger.to_state.attributes.friendly_name }} is open'
  - delay:
      minutes: 15
  mode: single
  max_exceeded: silent
