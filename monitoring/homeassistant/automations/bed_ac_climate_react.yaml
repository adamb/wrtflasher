- id: bed_ac_climate_react_on
  alias: Bed AC Climate React - Turn On
  description: Turn on bed AC in dry mode when room temp exceeds upper threshold
  triggers:
  - trigger: template
    value_template: >
      {{ states('climate.bed_ac_sensibo') in ['off', 'fan_only'] and
         state_attr('climate.bed_ac_sensibo', 'current_temperature') | float >
         states('input_number.bed_ac_upper_temp') | float }}
    for:
      seconds: 10
  conditions:
  - condition: state
    entity_id: input_boolean.bed_ac_climate_react
    state: 'on'
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.bed_ac_mold_cooldown
  - action: climate.set_hvac_mode
    target:
      entity_id: climate.bed_ac_sensibo
    data:
      hvac_mode: dry
  - action: climate.set_temperature
    target:
      entity_id: climate.bed_ac_sensibo
    data:
      temperature: "{{ states('input_number.bed_ac_set_temp') | int }}"
  - action: notify.mobile_app_blue17
    data:
      title: Bed AC On
      message: >
        Room temp {{ state_attr('climate.bed_ac_sensibo', 'current_temperature') }}°F
        exceeded {{ states('input_number.bed_ac_upper_temp') | int }}°F. Turned on dry mode at
        {{ states('input_number.bed_ac_set_temp') | int }}°F.
  mode: single
  max_exceeded: silent

- id: bed_ac_climate_react_off
  alias: Bed AC Climate React - Turn Off
  description: Turn off bed AC when room temp drops below lower threshold
  triggers:
  - trigger: template
    value_template: >
      {{ states('climate.bed_ac_sensibo') not in ['off', 'fan_only', 'unavailable'] and
         state_attr('climate.bed_ac_sensibo', 'current_temperature') | float <
         states('input_number.bed_ac_lower_temp') | float }}
    for:
      seconds: 10
  conditions:
  - condition: state
    entity_id: input_boolean.bed_ac_climate_react
    state: 'on'
  actions:
  - action: climate.turn_off
    target:
      entity_id: climate.bed_ac_sensibo
  - action: notify.mobile_app_blue17
    data:
      title: Bed AC Off
      message: >
        Room temp {{ state_attr('climate.bed_ac_sensibo', 'current_temperature') }}°F
        dropped below {{ states('input_number.bed_ac_lower_temp') | int }}°F. Turning off AC.
  mode: single
  max_exceeded: silent

- id: bed_ac_mold_protection
  alias: Bed AC Mold Protection - Start Fan
  description: When AC turns off, switch to fan_only and start 5-min countdown.
  triggers:
  - trigger: state
    entity_id: climate.bed_ac_sensibo
    to: 'off'
  conditions:
  - condition: state
    entity_id: timer.bed_ac_mold_cooldown
    state: idle
  actions:
  - action: climate.set_hvac_mode
    target:
      entity_id: climate.bed_ac_sensibo
    data:
      hvac_mode: fan_only
  - action: timer.start
    target:
      entity_id: timer.bed_ac_mold_cooldown
  mode: single
  max_exceeded: silent

- id: bed_ac_mold_protection_finish
  alias: Bed AC Mold Protection - Turn Off
  description: When mold cooldown timer finishes, turn off AC for real.
  triggers:
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: timer.bed_ac_mold_cooldown
  actions:
  - action: climate.turn_off
    target:
      entity_id: climate.bed_ac_sensibo
  mode: single

- id: bed_ac_mold_protection_cancel
  alias: Bed AC Mold Protection - Cancel
  description: If AC is turned back on during mold cooldown, cancel the timer.
  triggers:
  - trigger: state
    entity_id: climate.bed_ac_sensibo
    to:
    - cool
    - heat
    - dry
    - heat_cool
  conditions:
  - condition: state
    entity_id: timer.bed_ac_mold_cooldown
    state: active
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.bed_ac_mold_cooldown
  mode: single

- id: bed_ac_disable_sensibo_react
  alias: Bed AC - Disable Sensibo React
  description: Auto-disable Sensibo Climate React when HA Climate React is enabled
  triggers:
  - trigger: state
    entity_id: input_boolean.bed_ac_climate_react
    to: 'on'
  conditions:
  - condition: state
    entity_id: switch.bed_ac_sensibo_climate_react
    state: 'on'
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.bed_ac_sensibo_climate_react
  - action: notify.mobile_app_blue17
    data:
      title: Sensibo React Disabled
      message: Disabled Sensibo Climate React on Bed AC to avoid conflict with HA control.
  mode: single

- id: bed_ac_warmer
  alias: Bed AC - Warmer
  description: Shift temp window up by 1°F (upper, lower, set)
  triggers:
  - trigger: state
    entity_id: input_button.bed_ac_warmer
  actions:
  - action: input_number.set_value
    target:
      entity_id: input_number.bed_ac_upper_temp
    data:
      value: "{{ [states('input_number.bed_ac_upper_temp') | int + 4, 85] | min }}"
  - action: input_number.set_value
    target:
      entity_id: input_number.bed_ac_lower_temp
    data:
      value: "{{ [states('input_number.bed_ac_lower_temp') | int + 4, 80] | min }}"
  - action: input_number.set_value
    target:
      entity_id: input_number.bed_ac_set_temp
    data:
      value: "{{ [states('input_number.bed_ac_set_temp') | int + 4, 86] | min }}"
  mode: single

- id: bed_ac_cooler
  alias: Bed AC - Cooler
  description: Shift temp window down by 1°F (upper, lower, set)
  triggers:
  - trigger: state
    entity_id: input_button.bed_ac_cooler
  actions:
  - action: input_number.set_value
    target:
      entity_id: input_number.bed_ac_upper_temp
    data:
      value: "{{ [states('input_number.bed_ac_upper_temp') | int - 4, 70] | max }}"
  - action: input_number.set_value
    target:
      entity_id: input_number.bed_ac_lower_temp
    data:
      value: "{{ [states('input_number.bed_ac_lower_temp') | int - 4, 65] | max }}"
  - action: input_number.set_value
    target:
      entity_id: input_number.bed_ac_set_temp
    data:
      value: "{{ [states('input_number.bed_ac_set_temp') | int - 4, 61] | max }}"
  mode: single
