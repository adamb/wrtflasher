- id: bedroom_light_dim_10pm
  alias: "Bedroom: Dim light at 10pm"
  description: "Dim master bedroom light to 50% at 10pm if it's on"
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: light.master_bedroom
      state: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.master_bedroom
      data:
        brightness_pct: 50
