- id: bedroom_ac_away
  alias: "Bedroom AC: Away mode after 24h no motion"
  description: "Set bedroom AC to 80°F after 24 hours of no motion"
  trigger:
    - platform: state
      entity_id: binary_sensor.motion_sensor_occupancy
      to: "off"
      for:
        hours: 24
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.bedroom_ac_away
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.bedroom_ac_manual_override
    - service: input_number.set_value
      target:
        entity_id: input_number.bedroom_ac_last_auto_temp
      data:
        value: 80
    - service: climate.set_temperature
      target:
        entity_id: climate.master_ac
      data:
        temperature: 80
    - service: notify.mobile_app_blue17
      data:
        message: "Bedroom AC set to away mode (80°F) — no motion for 24 hours"
