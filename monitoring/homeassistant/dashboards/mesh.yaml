# Home Assistant Dashboard for Finca del Mar
# Mesh Network Monitoring
#
# To import:
# 1. Settings → Dashboards → Add Dashboard
# 2. Name it "Mesh Network"
# 3. Click the three dots → Edit Dashboard → Raw configuration editor
# 4. Paste this YAML

title: Mesh Network Monitor
views:
  # ========================================
  # OVERVIEW - Mesh Status
  # ========================================
  - title: Overview
    path: overview
    icon: mdi:wifi-star
    cards:
      # Title and Date/Time
      - type: markdown
        content: |
          # 🏡 Finca del Mar
          Mesh Network Monitoring
        columns: 1

      - type: markdown
        content: >
          Last updated: {{ as_timestamp(now()) | timestamp_custom('%Y-%m-%d %H:%M') }}

      # ========================================
      # CONNECTIVITY SECTION
      # ========================================
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # 📡 Connectivity
              Internet WAN status

          # WAN Status Grid
          - type: grid
            columns: 2
            square: false
            cards:
              # Starlink
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.starlink_connectivity
                    state: 'on'
                card:
                  type: tile
                  entity: binary_sensor.starlink_connectivity
                  name: Starlink
                  icon: mdi:satellite-variant
                  color: green
                  details: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.starlink_connectivity
                    state: 'off'
                card:
                  type: tile
                  entity: binary_sensor.starlink_connectivity
                  name: Starlink
                  icon: mdi:satellite-variant-off
                  color: red
                  details: true

              # T-Mobile
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.tmobile_connectivity
                    state: 'on'
                card:
                  type: tile
                  entity: binary_sensor.tmobile_connectivity
                  name: T-Mobile
                  icon: mdi:cellphone-wireless
                  color: green
                  details: true
              - type: conditional
                conditions:
                  - condition: state
                    entity: binary_sensor.tmobile_connectivity
                    state: 'off'
                card:
                  type: tile
                  entity: binary_sensor.tmobile_connectivity
                  name: T-Mobile
                  icon: mdi:cellphone-wireless-off
                  color: red
                  details: true

          # Detailed WAN Status
          - type: entities
            title: WAN Status Details
            show_header_toggle: false
            entities:
              - entity: sensor.mesh_node_gw_office_active_wan
                name: Active WAN
                icon: mdi:wan
              - entity: sensor.mesh_node_gw_office_wan1_status
                name: Starlink (eth1)
                icon: mdi:satellite-variant
              - entity: sensor.mesh_node_gw_office_wan2_status
                name: T-Mobile (eth2)
                icon: mdi:cellphone-wireless

      # ========================================
      # G.hn PLC SECTION
      # ========================================
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # ⚡ G.hn PLC
              Powerline backhaul between gateway and provisioning closet

          - type: history-graph
            title: G.hn PLC Throughput (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.g_hn_plc_ghn_gw_tx_rate_1
                name: ghn-gw Tx
              - entity: sensor.g_hn_plc_ghn_gw_rx_rate_1
                name: ghn-gw Rx
              - entity: sensor.g_hn_plc_ghn_prov_tx_rate_1
                name: ghn-prov Tx
              - entity: sensor.g_hn_plc_ghn_prov_rx_rate_1
                name: ghn-prov Rx

      # ========================================
      # MESH HEALTH SECTION
      # ========================================
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # 🔗 Mesh Network
              batman-adv mesh status

          # Total Clients
          - type: gauge
            entity: sensor.mesh_total_clients
            name: Total WiFi Clients
            min: 0
            max: 100
            needle: true
            severity:
              green: 0
              yellow: 50
              red: 80

          # Gateway Node
          - type: entities
            title: Gateway (gw-office)
            show_header_toggle: false
            entities:
              - entity: sensor.mesh_node_gw_office_neighbor_count
                name: Mesh Neighbors
                icon: mdi:router-wireless
              - entity: sensor.mesh_node_gw_office_best_signal
                name: Best Signal
                icon: mdi:wifi-strength
              - entity: sensor.mesh_node_gw_office_uptime
                name: Uptime

          # AP Nodes Grid
          - type: grid
            columns: 2
            square: false
            cards:
              - type: entities
                title: AP Nodes
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_ec54_neighbor_count
                    name: Central
                    icon: mdi:access-point
                  - entity: sensor.mesh_node_ap_d74c_neighbor_count
                    name: Jade
                    icon: mdi:access-point
                  - entity: sensor.mesh_node_ap_repay_ruffled_neighbor_count
                    name: Ruffled
                    icon: mdi:access-point
                  - entity: sensor.mesh_node_ap_repay_surrender_neighbor_count
                    name: Surrender
                    icon: mdi:access-point
                  - entity: sensor.mesh_node_ap_prov_neighbor_count
                    name: Prov
                    icon: mdi:access-point
                  - entity: sensor.mesh_node_ap_news_neighbor_count
                    name: News
                    icon: mdi:access-point
                  - entity: sensor.mesh_node_ap_cust_neighbor_count
                    name: Cust
                    icon: mdi:access-point

  # ========================================
  # CLIENTS - WiFi client details
  # ========================================
  - title: Clients
    path: clients
    icon: mdi:devices
    type: panel
    cards:
      - type: vertical-stack
        cards:
          # Summary row
          - type: horizontal-stack
            cards:
              - type: tile
                entity: sensor.mesh_total_clients
                name: Total
                icon: mdi:wifi
              - type: tile
                entity: sensor.mesh_total_clients_finca
                name: Finca
                icon: mdi:home-wifi
              - type: tile
                entity: sensor.mesh_total_clients_iot
                name: IoT
                icon: mdi:devices
              - type: tile
                entity: sensor.mesh_total_clients_guest
                name: Guest
                icon: mdi:account-multiple

          # AP cards - 3 columns
          - type: grid
            columns: 3
            square: false
            cards:
              - type: entities
                title: gw-office
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_gw_office_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_gw_office_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_gw_office_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_gw_office_clients_guest
                    name: Guest

              - type: entities
                title: ap-central
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_ec54_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_ec54_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_ec54_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_ec54_clients_guest
                    name: Guest

              - type: entities
                title: ap-jade
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_d74c_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_d74c_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_d74c_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_d74c_clients_guest
                    name: Guest


          # Casito APs - 2 columns
          - type: grid
            columns: 2
            square: false
            cards:
              - type: entities
                title: ap-ruffled
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_repay_ruffled_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_repay_ruffled_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_repay_ruffled_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_repay_ruffled_clients_guest
                    name: Guest

              - type: entities
                title: ap-surrender
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_repay_surrender_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_repay_surrender_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_repay_surrender_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_repay_surrender_clients_guest
                    name: Guest

          # New APs
          - type: grid
            columns: 3
            square: false
            cards:
              - type: entities
                title: ap-prov
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_prov_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_prov_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_prov_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_prov_clients_guest
                    name: Guest

              - type: entities
                title: ap-news
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_news_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_news_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_news_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_news_clients_guest
                    name: Guest

              - type: entities
                title: ap-cust
                show_header_toggle: false
                entities:
                  - entity: sensor.mesh_node_ap_cust_clients_total
                    name: Total
                    icon: mdi:sigma
                  - entity: sensor.mesh_node_ap_cust_clients_finca
                    name: Finca
                  - entity: sensor.mesh_node_ap_cust_clients_iot
                    name: IoT
                  - entity: sensor.mesh_node_ap_cust_clients_guest
                    name: Guest

          # History graph
          - type: history-graph
            title: Client Count History (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.mesh_total_clients_finca
                name: Finca
              - entity: sensor.mesh_total_clients_iot
                name: IoT
              - entity: sensor.mesh_total_clients_guest
                name: Guest

  # ========================================
  # MESH HEALTH - Signal strength details
  # ========================================
  - title: Mesh Health
    path: mesh_health
    icon: mdi:chart-line
    cards:
      - type: markdown
        content: |
          # 🔗 Mesh Signal Strength
          Batman-adv mesh backhaul monitoring (5GHz 802.11s)

      # Signal Strength Grid
      - type: grid
        columns: 2
        square: false
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_gw_office_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_gw_office_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_gw_office_best_signal
              name: gw-office Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_gw_office_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_gw_office_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **gw-office**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_ec54_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_ec54_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_ec54_best_signal
              name: ap-central Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_ec54_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_ec54_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-central**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_d74c_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_d74c_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_d74c_best_signal
              name: ap-jade Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_d74c_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_d74c_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-jade**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_repay_ruffled_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_repay_ruffled_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_repay_ruffled_best_signal
              name: ap-repay-ruffled Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_repay_ruffled_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_repay_ruffled_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-repay-ruffled**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_repay_surrender_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_repay_surrender_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_repay_surrender_best_signal
              name: ap-repay-surrender Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_repay_surrender_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_repay_surrender_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-repay-surrender**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_prov_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_prov_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_prov_best_signal
              name: ap-prov Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_prov_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_prov_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-prov**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_news_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_news_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_news_best_signal
              name: ap-news Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_news_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_news_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-news**

          - type: conditional
            conditions:
              - condition: state
                entity: sensor.mesh_node_ap_cust_best_signal
                state_not: unavailable
              - condition: state
                entity: sensor.mesh_node_ap_cust_best_signal
                state_not: unknown
            card:
              type: gauge
              entity: sensor.mesh_node_ap_cust_best_signal
              name: ap-cust Best Signal
              min: -90
              max: -30
              needle: true
              segments:
                - from: -90
                  to: -80
                  color: '#db4437'
                - from: -80
                  to: -70
                  color: '#ffa600'
                - from: -70
                  to: -30
                  color: '#43a047'
          - type: conditional
            conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.mesh_node_ap_cust_best_signal
                    state: unavailable
                  - condition: state
                    entity: sensor.mesh_node_ap_cust_best_signal
                    state: unknown
            card:
              type: markdown
              content: |
                ## Offline
                **ap-cust**

      # Signal History
      - type: history-graph
        title: Mesh Signal Strength (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.mesh_node_gw_office_best_signal
            name: gw-office
          - entity: sensor.mesh_node_ap_ec54_best_signal
            name: ap-central
          - entity: sensor.mesh_node_ap_d74c_best_signal
            name: ap-jade
          - entity: sensor.mesh_node_ap_repay_ruffled_best_signal
            name: ap-repay-ruffled
          - entity: sensor.mesh_node_ap_repay_surrender_best_signal
            name: ap-repay-surrender
          - entity: sensor.mesh_node_ap_prov_best_signal
            name: ap-prov
          - entity: sensor.mesh_node_ap_news_best_signal
            name: ap-news
          - entity: sensor.mesh_node_ap_cust_best_signal
            name: ap-cust

  # ========================================
  # SYSTEM STATS - Uptime and load
  # ========================================
  - title: System
    path: system
    icon: mdi:server
    cards:
      - type: markdown
        content: |
          # 🖥️ System Statistics
          Node uptime and load averages

      # Uptime
      - type: entities
        title: Uptime
        show_header_toggle: false
        entities:
          - entity: sensor.mesh_node_gw_office_uptime
            name: gw-office
          - entity: sensor.mesh_node_ap_ec54_uptime
            name: ap-central
          - entity: sensor.mesh_node_ap_d74c_uptime
            name: ap-jade
          - entity: sensor.mesh_node_ap_repay_ruffled_uptime
            name: ap-repay-ruffled
          - entity: sensor.mesh_node_ap_repay_surrender_uptime
            name: ap-repay-surrender
          - entity: sensor.mesh_node_ap_prov_uptime
            name: ap-prov
          - entity: sensor.mesh_node_ap_news_uptime
            name: ap-news
          - entity: sensor.mesh_node_ap_cust_uptime
            name: ap-cust

      # Load Average
      - type: entities
        title: Load Average (1min)
        show_header_toggle: false
        entities:
          - entity: sensor.mesh_node_gw_office_load
            name: gw-office
          - entity: sensor.mesh_node_ap_ec54_load
            name: ap-central
          - entity: sensor.mesh_node_ap_d74c_load
            name: ap-jade
          - entity: sensor.mesh_node_ap_repay_ruffled_load
            name: ap-repay-ruffled
          - entity: sensor.mesh_node_ap_repay_surrender_load
            name: ap-repay-surrender
          - entity: sensor.mesh_node_ap_prov_load
            name: ap-prov
          - entity: sensor.mesh_node_ap_news_load
            name: ap-news
          - entity: sensor.mesh_node_ap_cust_load
            name: ap-cust

      # Load History
      - type: history-graph
        title: System Load (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.mesh_node_gw_office_load
            name: gw-office
          - entity: sensor.mesh_node_ap_ec54_load
            name: ap-central
          - entity: sensor.mesh_node_ap_d74c_load
            name: ap-jade
          - entity: sensor.mesh_node_ap_repay_ruffled_load
            name: ap-repay-ruffled
          - entity: sensor.mesh_node_ap_repay_surrender_load
            name: ap-repay-surrender
          - entity: sensor.mesh_node_ap_prov_load
            name: ap-prov
          - entity: sensor.mesh_node_ap_news_load
            name: ap-news
          - entity: sensor.mesh_node_ap_cust_load
            name: ap-cust
