# AC Status Dashboard
#
# Copy to HA: scp monitoring/homeassistant/dashboards/ac.yaml ha:/homeassistant/dashboards/
#

title: AC Units
views:
  - title: Overview
    path: overview
    icon: mdi:air-conditioner
    cards:
      # ── Bed AC Climate React ──
      - type: entities
        title: Bed AC Climate React
        show_header_toggle: false
        entities:
          - entity: input_boolean.bed_ac_climate_react
            name: Enabled
          - entity: switch.bed_ac_sensibo_climate_react
            name: Sensibo React (should be off)
          - entity: climate.bed_ac_sensibo
            name: AC Status
          - type: attribute
            entity: climate.bed_ac_sensibo
            attribute: current_temperature
            name: Current Temp
            suffix: "°F"
          - type: attribute
            entity: climate.bed_ac_sensibo
            attribute: current_humidity
            name: Humidity
            suffix: "%"
          - entity: input_number.bed_ac_upper_temp
            name: Turn On Above
          - entity: input_number.bed_ac_lower_temp
            name: Turn Off Below
          - entity: input_number.bed_ac_set_temp
            name: AC Set Temp
          - entity: timer.bed_ac_mold_cooldown
            name: Mold Cooldown
      - type: horizontal-stack
        cards:
          - type: button
            entity: input_button.bed_ac_cooler
            name: Bed Cooler
            icon: mdi:thermometer-minus
            tap_action:
              action: toggle
          - type: button
            entity: input_button.bed_ac_warmer
            name: Bed Warmer
            icon: mdi:thermometer-plus
            tap_action:
              action: toggle

      # ── Gym AC Climate React ──
      - type: entities
        title: Gym AC Climate React
        show_header_toggle: false
        entities:
          - entity: input_boolean.gym_ac_climate_react
            name: Enabled
          - entity: switch.gym_ac_sensibo_climate_react
            name: Sensibo React (should be off)
          - entity: climate.gym_ac_sensibo
            name: AC Status
          - type: attribute
            entity: climate.gym_ac_sensibo
            attribute: current_temperature
            name: Current Temp
            suffix: "°F"
          - type: attribute
            entity: climate.gym_ac_sensibo
            attribute: current_humidity
            name: Humidity
            suffix: "%"
          - entity: input_number.gym_ac_upper_temp
            name: Turn On Above
          - entity: input_number.gym_ac_lower_temp
            name: Turn Off Below
          - entity: input_number.gym_ac_set_temp
            name: AC Set Temp
          - entity: timer.gym_ac_mold_cooldown
            name: Mold Cooldown
      - type: horizontal-stack
        cards:
          - type: button
            entity: input_button.gym_ac_cooler
            name: Gym Cooler
            icon: mdi:thermometer-minus
            tap_action:
              action: toggle
          - type: button
            entity: input_button.gym_ac_warmer
            name: Gym Warmer
            icon: mdi:thermometer-plus
            tap_action:
              action: toggle

      # ── Main House ──
      - type: markdown
        content: "## Main House"

      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.master_ac
            name: Master
          - type: thermostat
            entity: climate.bed_ac_sensibo
            name: Bed (Sensibo)

      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.gym_ac
            name: Gym
          - type: thermostat
            entity: climate.gym_ac_sensibo
            name: Gym (Sensibo)

      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.jade_s_ac
            name: Jade's
          - type: thermostat
            entity: climate.jared_s_ac
            name: Jared's

      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.lnlinkha_4100f2d7bcac0000b90460129f07
            name: Main

      # Casita
      - type: markdown
        content: "## Casita"

      - type: horizontal-stack
        cards:
          - type: thermostat
            entity: climate.big_ac
            name: Big AC

          # Cocina - thermostat shows wrong setpoint due to Tuya bug,
          # so use entities card with corrected template sensor
          - type: vertical-stack
            cards:
              - type: entities
                title: Cocina
                entities:
                  - entity: climate.casita_kitchen
                    name: Mode
                  - type: attribute
                    entity: climate.casita_kitchen
                    attribute: current_temperature
                    name: Current Temp
                    suffix: "°F"
                  - entity: sensor.cocina_ac_setpoint
                    name: Set Point

      # Cuarito - same Tuya setpoint bug as Cocina
      - type: entities
        title: Cuarito
        entities:
          - entity: climate.air_conditioner_2
            name: Mode
          - type: attribute
            entity: climate.air_conditioner_2
            attribute: current_temperature
            name: Current Temp
            suffix: "°F"
          - entity: sensor.cuarito_ac_setpoint
            name: Set Point

      # Quick glance - all units
      - type: glance
        title: Status at a Glance
        columns: 4
        show_state: true
        entities:
          - entity: climate.master_ac
            name: Master
          - entity: climate.gym_ac
            name: Gym
          - entity: climate.jade_s_ac
            name: Jade's
          - entity: climate.jared_s_ac
            name: Jared's
          - entity: climate.lnlinkha_4100f2d7bcac0000b90460129f07
            name: Main
          - entity: climate.bed_ac_sensibo
            name: Bed
          - entity: climate.gym_ac_sensibo
            name: Gym (S)
          - entity: climate.big_ac
            name: Big AC
          - entity: sensor.cocina_ac_setpoint
            name: Cocina
          - entity: sensor.cuarito_ac_setpoint
            name: Cuarito
